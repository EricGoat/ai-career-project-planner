<div class="container">
  <h1>AI Career Project Planner</h1>

  <label>Resume Text</label>
  <textarea name="resumeText" [(ngModel)]="resumeText" rows="10"></textarea>

  <label>Desired Job Description</label>
  <textarea name="jobText" [(ngModel)]="jobText" rows="10"></textarea>

  <button type="button" (click)="analyze()">Analyze</button>

  @if (result; as data) {
    <div >
      <h2>Missing Skills</h2>
      <ul>
        @for (skill of data.missing_skills; track skill) {
          <li> {{ skill }} </li>
        }
      </ul>

      <h2>Recommendations</h2>
      <ul>
        @for (rec of data.recommendations; track rec.project) {
          <li>
            <strong>{{ rec.skill }}</strong>:
            {{ rec.project }} — {{ rec.resource }}
          </li>
        }
      </ul>
    </div>
  }
</div>
