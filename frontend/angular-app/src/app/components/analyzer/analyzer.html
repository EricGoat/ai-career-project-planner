<div class="container">
  <h1>AI Career Project Planner</h1>

  <form [formGroup]="form" (ngSubmit)="analyze()">
    <label for="resumeFile">Resume File</label>
    <input
      id="resumeFile"
      type="file"
      accept=".txt,.md,.docx"
      (change)="onResumeFileSelected($event)"
    />

    <label for="targetRole">Target Job Role</label>
    <input id="targetRole" type="text" formControlName="targetRole" />

    <button type="submit">Analyze</button>
  </form>

  @if (result; as data) {
    <div class="results">
      <h2>Missing Skills</h2>
      <ul>
        @for (skill of data.missing_skills; track skill) {
          <li> {{ skill }} </li>
        }
      </ul>

      <h2>Recommendations</h2>
      <ul>
        @for (rec of data.recommendations; track rec.project) {
          <li>
            <strong>{{ rec.skill }}</strong>:
            {{ rec.project }} — {{ rec.resource }}
          </li>
        }
      </ul>
    </div>
  }
</div>
