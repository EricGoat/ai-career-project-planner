<div class="container">
  <h1>AI Career Project Planner</h1>

  <form [formGroup]="form" (ngSubmit)="analyze()">
    <label for="resumeText">Resume Text</label>
    <textarea id="resumeText" formControlName="resumeText" rows="10"></textarea>

    <label for="jobText">Desired Job Description</label>
    <textarea id="jobText" formControlName="jobText" rows="10"></textarea>

    <button type="submit">Analyze</button>
  </form>

  @if (result; as data) {
    <div class="results">
      <h2>Missing Skills</h2>
      <ul>
        @for (skill of data.missing_skills; track skill) {
          <li> {{ skill }} </li>
        }
      </ul>

      <h2>Recommendations</h2>
      <ul>
        @for (rec of data.recommendations; track rec.project) {
          <li>
            <strong>{{ rec.skill }}</strong>:
            {{ rec.project }} — {{ rec.resource }}
          </li>
        }
      </ul>
    </div>
  }
</div>
